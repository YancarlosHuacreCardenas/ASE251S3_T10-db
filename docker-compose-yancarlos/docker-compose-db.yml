version: '3'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest   # cambiar por tu usuario de dockerhub
    container_name: sql-server
    environment:
      SA_PASSWORD: "Yancarlos123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    networks:
      - my-network

# CREAR UNA RED EN ESTE COMPOSE PARA QUE SEA COMPARTIDA
networks:
  my-network:
    name: my-network   # red compartida, visible desde ambos compose
    driver: bridge
